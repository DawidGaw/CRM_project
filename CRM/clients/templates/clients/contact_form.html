{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Contact</title>

    <link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">

    <style>
        #wrapper { display: flex; }

        .sidebar {
            transition: width 0.25s ease, opacity 0.25s ease;
            overflow: hidden;
            width: 224px;
            min-width: 224px;
        }

        .sidebar.toggled {
            width: 0 !important;
            min-width: 0 !important;
            opacity: 0;
        }

        #sidebarToggleBtn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #858796;
            cursor: pointer;
        }
    </style>
</head>

<body id="page-top">

<div id="wrapper">

    <!-- SIDEBAR -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">

        <a class="sidebar-brand d-flex align-items-center justify-content-center"
           href="{% url 'dashboard' %}">
            <i class="fas fa-chart-line"></i>
            <div class="sidebar-brand-text mx-3">CRM Panel</div>
        </a>

        <hr class="sidebar-divider">

        <li class="nav-item">
            <a class="nav-link" href="{% url 'dashboard' %}">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
        </li>

        <li class="nav-item active">
            <a class="nav-link" href="{% url 'client_list' %}">
                <i class="fas fa-users"></i> Clients
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{% url 'contact_list' %}">
                <i class="fas fa-phone"></i> Contacts
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{% url 'task_list' %}">
                <i class="fas fa-tasks"></i> Tasks
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{% url 'deal_list' %}">
                <i class="fas fa-dollar-sign"></i> Deals
            </a>
        </li>

    </ul>

    <!-- CONTENT -->
    <div id="content-wrapper" class="d-flex flex-column" style="flex:1; min-width:0;">

        <div id="content">

            <!-- TOPBAR -->
            <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 shadow">

                <button id="sidebarToggleBtn">
                    <i class="fas fa-bars"></i>
                </button>

                <h5 class="ml-3 mb-0 text-primary font-weight-bold">
                    Add Contact
                </h5>

                <div class="ml-auto">
                    <a href="{% url 'client_detail' view.kwargs.client_id %}"
                       class="btn btn-secondary btn-sm">
                        <i class="fas fa-arrow-left"></i> Back
                    </a>
                </div>

            </nav>

            <!-- FORM -->
            <div class="container-fluid">

                <div class="row justify-content-center">

                    <div class="col-xl-6 col-lg-8 col-md-10">

                        <div class="card shadow">

                            <div class="card-body">

                                <form method="post">
                                    {% csrf_token %}

                                    <div class="form-group">
                                        <label>Contact Type</label>
                                        {{ form.contact_type }}
                                    </div>

                                    <div class="form-group">
                                        <label>Date</label>
                                        {{ form.contact_date }}
                                    </div>

                                    <div class="form-group">
                                        <label>Note</label>
                                        {{ form.note }}
                                    </div>

                                    <div class="form-group">
                                        <label>Next Follow-up</label>
                                        {{ form.next_followup }}
                                    </div>

                                    <button type="submit"
                                            class="btn btn-primary btn-block">
                                        Save Contact
                                    </button>

                                </form>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
<script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

<script>
    document.getElementById('sidebarToggleBtn').addEventListener('click', function () {
        document.getElementById('accordionSidebar').classList.toggle('toggled');
    });
</script>

</body>
</html>
